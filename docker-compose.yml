# Local dependencies only (DEVELOPMENT.md §5). One command to a running system:
#   docker compose up -d && dotnet run --project src/Api    (plus src/Worker)
#
# Cloud Tasks has no emulator — local runs and tests use InProcessQueue behind ITaskQueue,
# so there is deliberately no queue container here.
#
# Nothing reads these yet: Phase 1 is Stage A, which is pure local ffmpeg and needs no
# database and no object store. They land now because Phase 2 (Stages B–D) does, and
# because the promise above is only true if the file exists.
#
# Profile `e2e` (TESTING.md) adds the whole stack in containers — api, web, and the local
# Aspire dashboard for logs/traces. `docker compose --profile e2e up -d --build` is the one
# command that brings up everything the E2E suite runs against.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: vectorreel
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d vectorreel"]
      interval: 5s
      timeout: 3s
      retries: 10

  # GCS emulation. The real buckets are raw-videos-eu / outputs-eu (ARCHITECTURE.md §2);
  # -scheme http keeps the emulator plain-HTTP so no local certificate is needed. -external-url is
  # the in-network hostname so the resumable-upload session URL resolves from the api container
  # (the only GCS writer). Host-run dev overrides Gcs__EmulatorHost/this to localhost if needed.
  fake-gcs-server:
    image: fsouza/fake-gcs-server:1.52
    command: ["-scheme", "http", "-port", "4443", "-external-url", "http://fake-gcs-server:4443"]
    ports:
      - "4443:4443"
    volumes:
      - gcs-data:/storage

  api:
    profiles: ["e2e"]
    build:
      context: .
      dockerfile: src/Api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      # dev-only credentials, same as the postgres service above — not secrets.
      POSTGRES_CONNECTION: "Host=postgres;Port=5432;Database=vectorreel;Username=dev;Password=dev"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://aspire-dashboard:18889"
      APP_BASE_URL: "http://localhost:3000"
      # Browser origin of the web container as seen from the host.
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
      # Stage B/C run against the deterministic offline stand-in — Vertex cannot reach the local
      # emulator and the E2E suite must stay free and reproducible (CLAUDE.md rule 4 tier). Stage D
      # persists to the fake-gcs-server emulator, exercising the real GCS code path.
      PipelineModel__Mode: "fake"
      Gcs__EmulatorHost: "http://fake-gcs-server:4443"
      Gcs__Project: "vectorreel-e2e"
    depends_on:
      postgres:
        condition: service_healthy
      fake-gcs-server:
        condition: service_started
      aspire-dashboard:
        condition: service_started

  web:
    profiles: ["e2e"]
    build:
      context: web
      args:
        # Inlined client-side at build time; the browser runs on the host, so this is the
        # host-mapped api port, not the compose-internal hostname.
        NEXT_PUBLIC_API_BASE: "http://localhost:8080"
    ports:
      - "3000:8080"
    depends_on:
      - api

  # Local observability: logs + traces + metrics in one UI (http://localhost:19888), OTLP in on
  # 19889 (18889 in-network). Single container, EU/local only, nothing phones home (CLAUDE.md
  # rule 10 spirit).
  aspire-dashboard:
    profiles: ["e2e"]
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.1
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    ports:
      - "19888:18888"
      - "19889:18889"

volumes:
  postgres-data:
  gcs-data:

