<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="vectorreel">
  <title>vectorreel mark</title>
  <!-- Video frame. Stroked, NOT filled: the interior is a true hole, so the counters
       survive a flat single-colour fill (this is what the raster mark got wrong). -->
  <rect x="3.5" y="8.5" width="57" height="47" rx="9.5"
        fill="none" stroke="#0B1020" stroke-width="5"/>
  <!-- Play triangle: video -->
  <path d="M16 21.5 L16 42.5 L31 32 Z" fill="#0B1020"/>
  <!-- Structured text lines: decreasing length, teal accent on the last -->
  <rect x="36" y="21.5" width="17" height="5" rx="2.5" fill="#4F6BFF"/>
  <rect x="36" y="29.5" width="17" height="5" rx="2.5" fill="#4F6BFF"/>
  <rect x="36" y="37.5" width="10" height="5" rx="2.5" fill="#2DD4BF"/>
</svg>
