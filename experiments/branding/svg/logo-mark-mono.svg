        fill="none" stroke="currentColor" stroke-width="5"/>
  <path d="M16 21.5 L16 42.5 L31 32 Z"/>
  <rect x="36" y="21.5" width="17" height="5" rx="2.5"/>
  <rect x="36" y="29.5" width="17" height="5" rx="2.5"/>
  <rect x="36" y="37.5" width="10" height="5" rx="2.5"/>
</svg>
