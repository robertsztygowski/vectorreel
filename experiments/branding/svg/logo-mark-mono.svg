<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" fill="currentColor" role="img" aria-label="vectorreel">
  <title>vectorreel mark (monochrome)</title>
  <!-- Inherits the CSS `color` of its parent. Every shape is one colour and the counters
       are holes, so this reads at any single colour, on light or dark, and when filled
       black for print or stamped into a favicon. -->
